<style>
    .deposit-wrapper { animation: fadeIn 0.4s ease; max-width: 500px; margin: 0 auto; padding-bottom: 40px; }
    .bank-card { width: 100%; height: 220px; margin-bottom: 30px; background: linear-gradient(135deg, #1e1e24 0%, #0A84FF 100%); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 20px; padding: 25px; position: relative; box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6); overflow: hidden; }
    .card-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
    .card-chip { width: 45px; height: 35px; background: linear-gradient(135deg, #f1c40f, #e67e22); border-radius: 6px; }
    .bank-name { font-weight: 900; font-size: 20px; color: #fff; letter-spacing: 2px; }
    .card-number { font-family: 'Courier New', Courier, monospace; font-size: 32px; font-weight: 800; color: #fff; margin-bottom: 20px; text-shadow: 0 2px 5px rgba(0,0,0,0.5); }
    .card-holder { display: flex; justify-content: space-between; align-items: flex-end; }
    .holder-label { font-size: 11px; color: rgba(255,255,255,0.7); text-transform: uppercase; margin-bottom: 4px; }
    .holder-name { font-size: 16px; font-weight: 700; color: #fff; text-transform: uppercase;}

    .glass-box { background: rgba(30, 30, 35, 0.6); backdrop-filter: blur(25px); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 24px; padding: 30px 20px; text-align: center; margin-bottom: 30px; }
    .box-title { color: #fff; font-size: 22px; font-weight: 800; margin-bottom: 8px; }
    .amount-input { width: 100%; padding: 20px; background: rgba(0,0,0,0.4); border: 2px solid rgba(255,255,255,0.05); border-radius: 16px; color: #34C759; font-size: 32px; font-weight: 900; text-align: center; outline: none; transition: 0.3s; margin-bottom: 20px; }
    .amount-input:focus { border-color: #34C759; box-shadow: 0 0 20px rgba(52, 199, 89, 0.15); }
    .quick-amounts { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 25px; }
    .quick-btn { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: #fff; padding: 12px 0; border-radius: 12px; font-weight: 600; cursor: pointer; transition: 0.2s; }
    
    .btn-primary { width: 100%; padding: 16px; border-radius: 14px; border: none; font-size: 16px; font-weight: 800; color: #fff; cursor: pointer; text-transform: uppercase; }
    .btn-green { background: linear-gradient(135deg, #34C759, #28a745); }
    .btn-blue { background: linear-gradient(135deg, #0A84FF, #0056b3); }
    .btn-cancel { width: 100%; padding: 14px; background: transparent; border: none; color: #FF375F; font-size: 14px; font-weight: 700; cursor: pointer; margin-top: 10px; }

    .timer-box { display: inline-block; background: rgba(255, 55, 95, 0.1); border: 1px solid rgba(255, 55, 95, 0.3); color: #FF375F; padding: 6px 16px; border-radius: 20px; font-size: 14px; font-weight: 700; margin-bottom: 20px; }
    .qr-frame { width: 220px; height: 220px; margin: 0 auto 25px; padding: 10px; background: #fff; border-radius: 20px; }
    .qr-frame img { width: 100%; height: 100%; object-fit: contain; border-radius: 10px;}
    
    .info-item { display: flex; justify-content: space-between; align-items: center; padding: 14px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
    .info-label { color: #8e8e93; font-size: 14px; }
    .info-value { color: #fff; font-size: 16px; font-weight: 800; display: flex; align-items: center; gap: 8px;}
    .copy-badge { background: rgba(10, 132, 255, 0.15); color: #0A84FF; border: 1px solid rgba(10, 132, 255, 0.3); padding: 4px 10px; border-radius: 8px; font-size: 11px; font-weight: 800; cursor: pointer; }

    .history-section h3 { color: #fff; font-size: 18px; margin-bottom: 15px; padding-left: 5px; border-left: 4px solid var(--accent-blue); }
    .hist-table { width: 100%; border-collapse: collapse; background: rgba(20,20,25,0.8); border-radius: 16px; overflow: hidden; border: 1px solid rgba(255,255,255,0.05); }
    .hist-table th { background: rgba(255,255,255,0.05); color: #8e8e93; padding: 12px 15px; font-size: 13px; text-align: left; }
    .hist-table td { padding: 15px; border-bottom: 1px solid rgba(255,255,255,0.05); color: #fff; font-size: 14px; }
    .status-badge { padding: 4px 10px; border-radius: 8px; font-size: 11px; font-weight: 700; text-transform: uppercase; display: inline-block;}
    .st-processing { background: rgba(255, 159, 10, 0.15); color: #FF9F0A; border: 1px solid rgba(255, 159, 10, 0.3); }
    .st-success { background: rgba(52, 199, 89, 0.15); color: #34C759; border: 1px solid rgba(52, 199, 89, 0.3); }
    .st-failed { background: rgba(255, 55, 95, 0.15); color: #FF375F; border: 1px solid rgba(255, 55, 95, 0.3); }
</style>

<div class="deposit-wrapper">
    <div class="bank-card">
        <div class="card-top"><div class="card-chip"></div><div class="bank-name">CHANGMMO</div></div>
        <div class="card-number" id="virtualCardBalance">0 ₫</div>
        <div class="card-holder">
            <div><div class="holder-label">Tài Khoản</div><div class="holder-name" id="virtualCardName">KHÁCH VÃNG LAI</div></div>
            <img src="https://i.postimg.cc/MGgf66DF/D0BC7902-AF5B-4AA2-9FF5-87AD4DF5CAF0.png" style="width:40px; border-radius:8px; opacity:0.8;">
        </div>
    </div>

    <div id="depositUIContent"></div>

    <div class="history-section" style="margin-top: 40px;">
        <h3>Lịch Sử Nạp Của Bạn</h3>
        <table class="hist-table">
            <thead><tr><th>Mã Đơn</th><th>Số Tiền</th><th>Trạng Thái</th></tr></thead>
            <tbody id="depositTableBody"></tbody>
        </table>
    </div>
</div>

<script>
    document.getElementById('virtualCardBalance').textContent = window.formatCurrency(window.currentUser.balance);
    document.getElementById('virtualCardName').textContent = window.isLoggedIn ? window.currentUser.name.toUpperCase() : (window.currentLang === 'vi' ? 'KHÁCH VÃNG LAI' : 'GUEST USER');

    window.renderDepositScreen = function() {
        const container = document.getElementById('depositUIContent');
        if(!container) return;

        const activeOrderStr = localStorage.getItem('active_order');
        const activeOrder = activeOrderStr ? JSON.parse(activeOrderStr) : null;

        if (activeOrder && activeOrder.expiry > Date.now()) {
            container.innerHTML = `
                <div class="glass-box">
                    <div class="timer-box">Hết hạn sau: <span id="countdownDisplay">--:--</span></div>
                    <h2 class="box-title" style="color: #0A84FF;">MÃ QR TECHCOMBANK</h2>
                    <p style="color: #8e8e93; font-size: 13px; margin-bottom: 25px;">Chuyển đúng số tiền và nội dung để Admin duyệt</p>

                    <div class="qr-frame"><img src="https://i.postimg.cc/qMMj9wZz/IMG-5749.jpg"></div>

                    <div style="margin-bottom: 25px; text-align: left;">
                        <div class="info-item"><span class="info-label">Ngân Hàng</span><span class="info-value">TECHCOMBANK</span></div>
                        <div class="info-item"><span class="info-label">Chủ Tài Khoản</span><span class="info-value">DINH ANH CHANG</span></div>
                        <div class="info-item"><span class="info-label">Số tiền</span><span class="info-value" style="color: #34C759;">${window.formatCurrency(activeOrder.amount)} <button class="copy-badge" onclick="window.copyToClip('${activeOrder.amount}')">COPY</button></span></div>
                        <div class="info-item"><span class="info-label">Nội dung</span><span class="info-value" style="color: #FF375F;">${activeOrder.code} <button class="copy-badge" onclick="window.copyToClip('${activeOrder.code}')">COPY</button></span></div>
                        <div class="info-item"><span class="info-label">Số tài khoản</span><span class="info-value">20777212888 <button class="copy-badge" onclick="window.copyToClip('20777212888')">COPY</button></span></div>
                    </div>

                    <button class="btn-primary btn-blue" onclick="window.submitDepositProof()">Tôi đã chuyển khoản</button>
                    <button class="btn-cancel" onclick="window.cancelOrderAction()">Huỷ đơn này</button>
                </div>`;
            window.startCountdown(Math.floor((activeOrder.expiry - Date.now()) / 1000));
        } else {
            container.innerHTML = `
                <div class="glass-box">
                    <h2 class="box-title">Tạo Đơn Nạp Mới</h2>
                    <p style="color: #8e8e93; font-size: 14px; margin-bottom: 25px;">Hệ thống hỗ trợ duyệt nạp 24/7</p>

                    <input type="number" id="inputDepositAmt" class="amount-input" placeholder="0" min="10000">

                    <div class="quick-amounts">
                        <button class="quick-btn" onclick="document.getElementById('inputDepositAmt').value=50000">50k</button>
                        <button class="quick-btn" onclick="document.getElementById('inputDepositAmt').value=200000">200k</button>
                        <button class="quick-btn" onclick="document.getElementById('inputDepositAmt').value=500000">500k</button>
                    </div>

                    <button class="btn-primary btn-green" onclick="window.createNewOrder()">Tạo Hóa Đơn Nạp</button>
                </div>`;
        }
    };

    window.renderDepositTable = function() {
        const tbody = document.getElementById('depositTableBody');
        if(!tbody) return;
        
        if (!window.isLoggedIn || !window.currentUser.history || window.currentUser.history.length === 0) {
            tbody.innerHTML = `<tr><td colspan="3" style="text-align:center; color:#8e8e93; padding:30px;">Bạn chưa có giao dịch nạp tiền nào</td></tr>`;
            return;
        }

        const deposits = window.currentUser.history.filter(t => t.type === 'deposit');
        
        if (deposits.length === 0) {
            tbody.innerHTML = `<tr><td colspan="3" style="text-align:center; color:#8e8e93; padding:30px;">Bạn chưa có giao dịch nạp tiền nào</td></tr>`;
            return;
        }

        tbody.innerHTML = deposits.map(t => `
            <tr>
                <td style="color:#0A84FF; font-weight:700;">${t.id}</td>
                <td style="color:#34C759; font-weight:700;">+${window.formatCurrency(t.amount)}</td>
                <td>
                    <span class="status-badge ${t.status === 'success' ? 'st-success' : (t.status === 'failed' ? 'st-failed' : 'st-processing')}">
                        ${t.status === 'success' ? 'Thành công' : (t.status === 'failed' ? 'Thất bại' : 'Đang xử lý')}
                    </span>
                </td>
            </tr>
        `).join('');
    };

    window.renderDepositScreen();
    window.renderDepositTable();
</script>
