<style>
    .history-wrapper { max-width: 800px; margin: 0 auto; animation: fadeIn 0.4s ease; padding-bottom: 50px; }
    
    .glass-box { background: rgba(30, 30, 35, 0.6); backdrop-filter: blur(25px); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 24px; padding: 30px 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.3); }
    .box-title { color: #fff; font-size: 24px; font-weight: 800; margin-bottom: 25px; text-align: center; }

    .full-table { width: 100%; border-collapse: collapse; }
    .full-table th { background: rgba(255,255,255,0.05); color: #8e8e93; padding: 15px; font-size: 13px; text-align: left; text-transform: uppercase; letter-spacing: 1px; }
    .full-table td { padding: 18px 15px; border-bottom: 1px solid rgba(255,255,255,0.05); color: #fff; font-size: 15px; vertical-align: middle; }
    
    .type-badge { padding: 6px 12px; border-radius: 8px; font-size: 12px; font-weight: 700; display: inline-block;}
    .type-deposit { background: rgba(52, 199, 89, 0.15); color: #34C759; }
    .type-purchase { background: rgba(255, 55, 95, 0.15); color: #FF375F; }

    .status-badge { padding: 6px 12px; border-radius: 8px; font-size: 11px; font-weight: 700; text-transform: uppercase; display: inline-block;}
    .st-processing { background: rgba(255, 159, 10, 0.15); color: #FF9F0A; border: 1px solid rgba(255, 159, 10, 0.3); }
    .st-success { background: rgba(52, 199, 89, 0.15); color: #34C759; border: 1px solid rgba(52, 199, 89, 0.3); }
    .st-failed { background: rgba(255, 55, 95, 0.15); color: #FF375F; border: 1px solid rgba(255, 55, 95, 0.3); }
</style>

<div class="history-wrapper">
    <div class="glass-box" style="overflow-x: auto;">
        <h2 class="box-title">Tất Cả Giao Dịch</h2>
        
        <table class="full-table" style="min-width: 600px;">
            <thead>
                <tr>
                    <th>Mã GD</th>
                    <th>Thời gian</th>
                    <th>Loại</th>
                    <th>Số tiền</th>
                    <th>Trạng thái</th>
                </tr>
            </thead>
            <tbody id="fullHistoryTableBody">
                <!-- Nội dung JS đổ vào -->
            </tbody>
        </table>
    </div>
</div>

<script>
    window.renderHistoryTable = function() {
        const tbody = document.getElementById('fullHistoryTableBody');
        if(!tbody) return;

        if (!window.isLoggedIn || !window.currentUser.history || window.currentUser.history.length === 0) {
            tbody.innerHTML = `<tr><td colspan="5" style="text-align:center; color:#8e8e93; padding:50px;">Bạn chưa có giao dịch nào trên hệ thống.</td></tr>`;
            return;
        }

        tbody.innerHTML = window.currentUser.history.map(t => `
            <tr>
                <td style="font-weight:700; color:#0A84FF;">${t.id || '---'}</td>
                <td style="color:#8e8e93; font-size: 13px;">${t.time}</td>
                <td>
                    <span class="type-badge ${t.type === 'deposit' ? 'type-deposit' : 'type-purchase'}">
                        ${t.type === 'deposit' ? 'Nạp Tiền' : 'Mua Dịch Vụ'}
                    </span>
                </td>
                <td style="font-weight:800; color: ${t.type === 'deposit' ? '#34C759' : '#FF375F'}">
                    ${t.type === 'deposit' ? '+' : '-'}${window.formatCurrency(t.amount)}
                </td>
                <td>
                    <span class="status-badge ${t.status === 'success' ? 'st-success' : (t.status === 'failed' ? 'st-failed' : 'st-processing')}">
                        ${t.status === 'success' ? 'Thành công' : (t.status === 'failed' ? 'Thất bại' : 'Đang xử lý')}
                    </span>
                </td>
            </tr>
        `).join('');
    };

    window.renderHistoryTable();
</script>
