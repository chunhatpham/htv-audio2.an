<style>
    .auth-container { max-width: 400px; margin: 40px auto; background: rgba(30, 30, 35, 0.6); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); border-radius: 24px; padding: 40px 30px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); animation: fadeIn 0.5s ease; }
    .auth-header { text-align: center; margin-bottom: 30px; }
    .auth-header h2 { font-size: 28px; color: #fff; margin-bottom: 8px; }
    .auth-header p { color: var(--text-secondary); font-size: 15px; }
    .input-group { margin-bottom: 20px; position: relative; }
    .input-group label { display: block; font-size: 13px; color: #8e8e93; margin-bottom: 8px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; }
    .auth-input { width: 100%; padding: 14px 16px; background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; color: #fff; font-size: 15px; transition: all 0.3s; outline: none; }
    .auth-input:focus { border-color: var(--accent-blue); box-shadow: 0 0 15px rgba(10, 132, 255, 0.2); background: rgba(10, 132, 255, 0.05); }
    .auth-btn { width: 100%; padding: 16px; border-radius: 14px; background: linear-gradient(135deg, #0A84FF, #00C6FF); color: #fff; border: none; font-size: 16px; font-weight: 700; cursor: pointer; transition: all 0.3s; margin-top: 10px; box-shadow: 0 5px 15px rgba(10,132,255,0.3); }
    .auth-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(10,132,255,0.5); }
    .auth-links { margin-top: 25px; text-align: center; font-size: 14px; color: var(--text-secondary); }
    .auth-links a { color: var(--accent-blue); text-decoration: none; font-weight: 600; cursor: pointer; transition: 0.2s; }
    .auth-links a:hover { text-shadow: 0 0 8px var(--accent-blue); }
</style>

<div class="auth-container">
    <div class="auth-header">
        <h2>Đăng Nhập</h2>
        <p>Chào mừng bạn trở lại hệ thống</p>
    </div>
    
    <div class="input-group">
        <label>SĐT / Tên tài khoản</label>
        <input type="text" id="loginId" class="auth-input" placeholder="Nhập số điện thoại hoặc tên nick..." autocomplete="off">
    </div>
    
    <div class="input-group">
        <label>Mật khẩu</label>
        <input type="password" id="loginPass" class="auth-input" placeholder="••••••••">
    </div>
    
    <button class="auth-btn" onclick="executeLogin()">Đăng Nhập Ngay</button>
    
    <div class="auth-links">
        Chưa có tài khoản? <a onclick="navigateTo('pages/account/register.html')">Đăng ký ngay</a>
    </div>
</div>
