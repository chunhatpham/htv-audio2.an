<style>
    .profile-container { max-width: 600px; margin: 40px auto; animation: fadeIn 0.5s ease; padding-bottom: 30px;}
    .user-card { background: rgba(30, 30, 35, 0.6); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); border-radius: 24px; padding: 40px 30px; text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.5); position: relative; overflow: hidden; }
    .user-card::before { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100px; background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple)); opacity: 0.2; }
    .profile-avatar { width: 110px; height: 110px; border-radius: 50%; margin: 0 auto 20px; display: flex; justify-content: center; align-items: center; border: 4px solid var(--bg-base); box-shadow: 0 0 30px rgba(10, 132, 255, 0.6); position: relative; z-index: 2; animation: floatLogo 3s infinite alternate ease-in-out; }
    .profile-name { font-size: 26px; font-weight: 800; color: #fff; margin-bottom: 5px; }
    .profile-id { color: var(--text-secondary); font-size: 15px; margin-bottom: 20px; }
    
    .ref-box { background: rgba(0,0,0,0.4); border: 1px dashed rgba(10, 132, 255, 0.5); border-radius: 16px; padding: 20px; margin: 25px 0; display: flex; justify-content: space-between; align-items: center; text-align: left;}
    .ref-info p { color: #8e8e93; font-size: 13px; text-transform: uppercase; margin-bottom: 5px; font-weight: 600;}
    .ref-info h3 { color: var(--accent-blue); font-size: 20px; font-family: monospace; letter-spacing: 2px;}
    .copy-btn { background: rgba(10, 132, 255, 0.1); border: 1px solid rgba(10, 132, 255, 0.3); color: var(--accent-blue); padding: 8px 16px; border-radius: 10px; cursor: pointer; font-weight: 600; transition: 0.2s;}
    .copy-btn:hover { background: var(--accent-blue); color: #fff; }

    .logout-btn { width: 100%; padding: 16px; border-radius: 14px; background: linear-gradient(135deg, #FF3B30, #FF453A); color: #fff; border: none; font-size: 16px; font-weight: 700; cursor: pointer; transition: all 0.3s; margin-top: 10px; box-shadow: 0 5px 15px rgba(255, 59, 48, 0.3); display: flex; justify-content: center; align-items: center; gap: 8px;}
    .logout-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(255, 59, 48, 0.5); }
    .logout-btn svg { width: 20px; height: 20px; fill: currentColor; }
</style>

<div class="profile-container">
    <div class="user-card">
        <div class="profile-avatar">
            <img src="https://img.freepik.com/free-psd/3d-illustration-person-with-sunglasses_23-2149436188.jpg?w=256" style="width: 100%; height: 100%; border-radius: 50%; object-fit: cover;">
        </div>
        
        <div class="profile-name" id="displayUserName">Đang tải...</div>
        <div class="profile-id" id="displayUserId">...</div>

        <div class="ref-box">
            <div class="ref-info">
                <p>Mã Giới Thiệu</p>
                <h3 id="displayRefCode">CHANG_VIP</h3>
            </div>
            <button class="copy-btn" onclick="window.copyToClip(document.getElementById('displayRefCode').textContent)">Copy</button>
        </div>

        <button class="logout-btn" onclick="window.executeLogout()">
            <svg viewBox="0 0 24 24"><path d="M17 7l-1.41 1.41L18.17 11H8v2h10.17l-2.58 2.58L17 17l5-5zM4 5h8V3H4c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h8v-2H4V5z"/></svg>
            Đăng Xuất
        </button>
    </div>
</div>

<script>
    document.getElementById('displayUserName').textContent = window.currentUser.name;
    document.getElementById('displayUserId').textContent = window.currentUser.id || window.currentUser.identifier || "Khách";
    document.getElementById('displayRefCode').textContent = window.currentUser.refCode || "CHƯA_CÓ_MÃ";
</script>
