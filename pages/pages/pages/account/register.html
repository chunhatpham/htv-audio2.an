<style>
    .auth-container { max-width: 400px; margin: 40px auto; background: rgba(30, 30, 35, 0.6); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); border-radius: 24px; padding: 40px 30px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); overflow: hidden; }
    .auth-header { text-align: center; margin-bottom: 30px; }
    .auth-header h2 { font-size: 28px; color: #fff; margin-bottom: 8px; }
    .auth-header p { color: var(--text-secondary); font-size: 15px; }
    .input-group { margin-bottom: 20px; }
    .input-group label { display: block; font-size: 13px; color: #8e8e93; margin-bottom: 8px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; }
    .auth-input { width: 100%; padding: 14px 16px; background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; color: #fff; font-size: 15px; transition: all 0.3s; outline: none; }
    .auth-input:focus { border-color: var(--accent-pink); box-shadow: 0 0 15px rgba(255, 55, 95, 0.2); background: rgba(255, 55, 95, 0.05); }
    .auth-btn { width: 100%; padding: 16px; border-radius: 14px; background: linear-gradient(135deg, #FF375F, #FF7043); color: #fff; border: none; font-size: 16px; font-weight: 700; cursor: pointer; transition: all 0.3s; margin-top: 10px; box-shadow: 0 5px 15px rgba(255,55,95,0.3); }
    .auth-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(255,55,95,0.5); }
    .auth-links { margin-top: 25px; text-align: center; font-size: 14px; color: var(--text-secondary); }
    .auth-links a { color: var(--accent-pink); text-decoration: none; font-weight: 600; cursor: pointer; transition: 0.2s; }
    
    /* Hiệu ứng trượt cho 2 bước */
    #step1, #step2 { transition: all 0.4s ease; }
    #step2 { display: none; opacity: 0; transform: translateX(50px); }
</style>

<div class="auth-container">
    <div class="auth-header">
        <h2>Đăng Ký</h2>
        <p id="reg-desc">Tạo tài khoản để nhận ưu đãi</p>
    </div>
    
    <!-- BƯỚC 1: NHẬP THÔNG TIN CƠ BẢN -->
    <div id="step1">
        <div class="input-group">
            <label>SĐT hoặc Email</label>
            <input type="text" id="regId" class="auth-input" placeholder="Nhập SĐT hoặc Email...">
        </div>
        <div class="input-group">
            <label>Mật khẩu</label>
            <input type="password" id="regPass" class="auth-input" placeholder="Mật khẩu từ 6 kí tự...">
        </div>
        <div class="input-group">
            <label>Xác nhận mật khẩu</label>
            <input type="password" class="auth-input" placeholder="Nhập lại mật khẩu...">
        </div>
        <div class="input-group">
            <label>Mã giới thiệu (Nếu có)</label>
            <input type="text" id="regRef" class="auth-input" placeholder="Mã đại lý/Người giới thiệu">
        </div>
        <button class="auth-btn" onclick="goToStep2()">Tiếp Tục ➔</button>
        <div class="auth-links">Đã có tài khoản? <a onclick="navigateTo('pages/account/login.html')">Đăng nhập</a></div>
    </div>

    <!-- BƯỚC 2: TẠO TÊN NICKNAME -->
    <div id="step2">
        <div style="text-align: center; margin-bottom: 20px;">
            <svg style="width:60px; height:60px; fill:var(--accent-pink); margin-bottom: 10px;" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 3c1.66 0 3 1.34 3 3s-1.34 3-3 3-3-1.34-3-3 1.34-3 3-3zm0 14.2c-2.5 0-4.71-1.28-6-3.22.03-1.99 4-3.08 6-3.08 1.99 0 5.97 1.09 6 3.08-1.29 1.94-3.5 3.22-6 3.22z"/></svg>
            <h3 style="color:#fff;">Bước cuối cùng!</h3>
            <p style="color:#8e8e93; font-size:14px;">Hãy chọn một cái tên thật ngầu để hiển thị trên hệ thống.</p>
        </div>
        <div class="input-group">
            <label>Tên Tài Khoản (Nickname)</label>
            <input type="text" id="regName" class="auth-input" placeholder="Ví dụ: ChangDinhAnh99">
        </div>
        <button class="auth-btn" onclick="executeRegister()">Hoàn Tất Đăng Ký</button>
        <div class="auth-links"><a onclick="backToStep1()">⬅ Quay lại</a></div>
    </div>
</div>

<script>
    // Xử lý chuyển đổi giao diện Bước 1 -> Bước 2
    function goToStep2() {
        const id = document.getElementById('regId').value;
        const pass = document.getElementById('regPass').value;
        if(id === '' || pass === '') {
            alert('Vui lòng nhập đầy đủ SĐT/Email và Mật khẩu!');
            return;
        }
        document.getElementById('step1').style.display = 'none';
        document.getElementById('step2').style.display = 'block';
        setTimeout(() => {
            document.getElementById('step2').style.opacity = '1';
            document.getElementById('step2').style.transform = 'translateX(0)';
        }, 50);
        document.getElementById('reg-desc').textContent = "Thiết lập Hồ sơ cá nhân";
    }

    function backToStep1() {
        document.getElementById('step2').style.display = 'none';
        document.getElementById('step2').style.opacity = '0';
        document.getElementById('step2').style.transform = 'translateX(50px)';
        document.getElementById('step1').style.display = 'block';
        document.getElementById('reg-desc').textContent = "Tạo tài khoản để nhận ưu đãi";
    }
</script>
